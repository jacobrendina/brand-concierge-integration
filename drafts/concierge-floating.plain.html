<div>
  <h1 id="floating-brand-concierge">Floating Brand Concierge</h1>
  <p>Option 3: metadata enables a floating launcher in the bottom-right that opens a compact chat window.</p>
  <p>This page sets the page metadata <code>brand-concierge = floating</code>, which is all that is required to switch on the widget.</p>
</div>
<div>
  <div class="metadata">
    <div>
      <div>brand-concierge</div>
      <div>floating</div>
    </div>
  </div>
</div>
