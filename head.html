<script>
  window.addEventListener("load", function() {
      // Define styling configurations
      window.styleConfiguration = {
          // Your configuration object here (see styling config section below for complete object)
      };
      
      // Initialize the Web Client
      function initializeBC() {
          if (window.adobe && window.adobe.concierge && window.adobe.concierge.bootstrap) {
              try {
                  const mountPoint = document.getElementById("brand-concierge-mount");
                  if (!mountPoint) {
                      console.error("Mount point not found");
                      return;
                  }
                  
                  // Clear any existing content
                  mountPoint.innerHTML = "";
                  
                  window.adobe.concierge.bootstrap({
                      instanceName: "alloy",
                      stylingConfigurations: window.styleConfiguration,
                      selector: "#brand-concierge-mount"
                  });
                  console.log("Brand Concierge initialized successfully");
              } catch (error) {
                  console.error("Error initializing Brand Concierge:", error);
              }
          } else {
              console.error("Brand Concierge Web Client not loaded. Please check that the script is loaded correctly.");
          }
      }
      
      // Try immediately, then retry if needed
      initializeBC();
      setTimeout(initializeBC, 500);
      setTimeout(initializeBC, 2000);
  });
</script>
