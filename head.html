  !function (n, o) {

      n[o] || ((n.__alloyNS = n.__alloyNS || []).push(o), n[o] = function () {

<script nonce="aem">
  alloy("configure", {
    defaultConsent: "in",
    edgeDomain: "edge.adobedc.net",
    edgeBasePath: "ee",
    datastreamId: "bfb0dbed-d494-4315-aed7-a96389c3fc8c",
    orgId: "09CF60665F98CEF90A495FF8@AdobeOrg",
    debugEnabled: true,
    idMigrationEnabled: false,
    thirdPartyCookiesEnabled: false
  });

  function whenMountReady(callback) {
    const existing = document.querySelector("#brand-concierge-mount");
    if (existing) {
      callback(existing);
      return;
    }

    const observer = new MutationObserver(function () {
      const mount = document.querySelector("#brand-concierge-mount");
      if (mount) {
        observer.disconnect();
        callback(mount);
      }
    });

    observer.observe(document.documentElement, { childList: true, subtree: true });
  }

  whenMountReady(function () {
    if (!window.styleConfiguration) {
      console.error("[BC] Missing window.styleConfiguration");
      return;
    }

    alloy("sendEvent", {})
      .then(() => {
        const existing = document.querySelector('script[src="/scripts/brandconciergemain.js"]');
        if (existing) {
          if (window.adobe?.concierge?.bootstrap) {
            window.adobe.concierge.bootstrap({
              instanceName: "alloy",
              stylingConfigurations: window.styleConfiguration,
              selector: "#brand-concierge-mount"
            });
          }
          return;
        }

        const s = document.createElement("script");
        s.src = "/scripts/brandconciergemain.js";
        s.onload = function () {
          if (!window.adobe?.concierge?.bootstrap) {
            console.error("[BC] Web client loaded but bootstrap API missing");
            return;
          }

          window.adobe.concierge.bootstrap({
            instanceName: "alloy",
            stylingConfigurations: window.styleConfiguration,
            selector: "#brand-concierge-mount"
          });
        };
        s.onerror = function () {
          console.error("[BC] Failed to load /scripts/brandconciergemain.js");
        };

        document.head.appendChild(s);
      })
      .catch((err) => {
        console.error("[BC] Alloy init failed", err);
      });
  });
</script>
